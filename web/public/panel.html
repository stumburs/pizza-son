<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Panel - Bert Stats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #08080a;
        --surface-1: #111114;
        --surface-2: #18181c;
        --surface-3: #222228;
        --border: rgba(255, 255, 255, 0.06);
        --border-hover: rgba(255, 255, 255, 0.12);
        --accent: #a78bfa;
        --accent-dim: rgba(167, 139, 250, 0.12);
        --accent-glow: rgba(167, 139, 250, 0.25);
        --green: #34d399;
        --green-dim: rgba(52, 211, 153, 0.12);
        --red: #ef4444;
        --red-dim: rgba(239, 68, 68, 0.12);
        --text-primary: #f0f0f4;
        --text-secondary: #8b8b9a;
        --text-muted: #55555f;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        background: var(--bg);
        color: var(--text-primary);
        margin: 0;
        padding: 24px 20px;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(167, 139, 250, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(167, 139, 250, 0.015) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      .main {
        position: relative;
        z-index: 1;
        max-width: 860px;
        margin: auto;
      }

      /* Login screen */
      .login-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
      }
      .login-screen h1 {
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
      }
      .login-screen p {
        color: var(--text-secondary);
        margin: 0 0 28px;
        font-size: 0.95rem;
      }
      .login-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 32px;
        background: #9146ff;
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-family: "DM Sans", sans-serif;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.18s, transform 0.12s;
        text-decoration: none;
      }
      .login-btn:hover {
        background: #7c2fe0;
        transform: translateY(-1px);
      }
      .login-btn svg { width: 22px; height: 22px; fill: #fff; }
      .login-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      /* Loading spinner */
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255,255,255,0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-text {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .header h1 {
        font-size: 1.3rem;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.02em;
      }
      .header-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent-glow);
        flex-shrink: 0;
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent-glow); }
        50% { opacity: 0.5; box-shadow: 0 0 4px transparent; }
      }
      .user-info {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.85rem;
        color: var(--text-secondary);
      }
      .user-info strong { color: var(--text-primary); }
      .logout-btn {
        background: var(--surface-3);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        padding: 6px 14px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 0.8rem;
        transition: color 0.14s, border-color 0.14s;
      }
      .logout-btn:hover {
        color: var(--text-primary);
        border-color: var(--border-hover);
      }

      /* Channel selector */
      .channel-bar {
        display: flex;
        gap: 6px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .channel-btn {
        padding: 8px 18px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface-2);
        color: var(--text-secondary);
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.14s;
      }
      .channel-btn:hover {
        border-color: var(--border-hover);
        color: var(--text-primary);
      }
      .channel-btn.active {
        background: var(--accent-dim);
        border-color: rgba(167, 139, 250, 0.3);
        color: var(--accent);
      }

      /* Panel */
      .panel-box {
        background: var(--surface-1);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px 24px;
        margin-bottom: 16px;
      }
      .panel-box h2 {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
        margin: 0 0 14px;
      }
      .panel-box h2 span {
        color: var(--text-secondary);
        font-size: 0.7rem;
        margin-left: 8px;
      }

      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .item:last-child { border-bottom: none; }
      .item-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .item-name {
        font-family: "DM Mono", monospace;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text-primary);
      }
      .item-desc {
        font-size: 0.75rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .item-protected {
        font-size: 0.65rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* Toggle switch */
      .toggle {
        position: relative;
        width: 42px;
        height: 24px;
        flex-shrink: 0;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: var(--surface-3);
        border-radius: 24px;
        transition: background 0.2s;
      }
      .toggle .slider::before {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        left: 3px;
        bottom: 3px;
        background: var(--text-muted);
        border-radius: 50%;
        transition: all 0.2s;
      }
      .toggle input:checked + .slider {
        background: var(--accent-dim);
      }
      .toggle input:checked + .slider::before {
        background: var(--accent);
        transform: translateX(18px);
      }
      .toggle input:disabled + .slider {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Save bar */
      .save-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 14px 20px;
        margin-top: 16px;
        position: sticky;
        bottom: 16px;
      }
      .save-btn {
        padding: 10px 24px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        font-family: "DM Sans", sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.14s;
      }
      .save-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .save-btn:not(:disabled):hover {
        opacity: 0.9;
      }
      .save-status {
        font-size: 0.85rem;
        color: var(--green);
      }
      .save-status.error {
        color: var(--red);
      }

      /* Loading */
      .loading {
        text-align: center;
        color: var(--text-muted);
        padding: 40px;
        font-style: italic;
      }

      .hidden { display: none !important; }

      @media (max-width: 600px) {
        body { padding: 14px 12px; }
        .panel-box { padding: 14px 16px; }
        .header { flex-direction: column; align-items: flex-start; }
        .user-info { margin-left: 0; }
      }
    </style>
  </head>
  <body>
    <div class="main" id="app">
      <div id="loginScreen" class="login-screen">
        <h1>control panel</h1>
        <p id="loginDesc">Log in with your Twitch account to manage commands and listeners.</p>
        <button class="login-btn" id="loginBtn" onclick="login()">
          <svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.428l-3 3v-3H6.857V1.714h13.714Z"/></svg>
          <span id="loginBtnText">Log in with Twitch</span>
        </button>
        <div id="loginLoading" class="loading-text hidden"><span class="spinner"></span> Completing login...</div>
      </div>

      <div id="panelView" class="hidden">
        <div class="header">
          <div class="header-dot"></div>
          <h1>control panel</h1>
          <div class="user-info">
            <span id="userDisplay"></span>
            <button class="logout-btn" onclick="logout()">log out</button>
          </div>
        </div>

        <div class="channel-bar" id="channelBar"></div>

        <div id="channelContent">
          <div class="panel-box">
            <h2>Commands <span id="cmdCount"></span></h2>
            <div id="commandsList" class="loading">Loading commands...</div>
          </div>

          <div class="panel-box">
            <h2>Listeners <span id="listenerCount"></span></h2>
            <div id="listenersList" class="loading">Loading listeners...</div>
          </div>

          <div class="save-bar">
            <div id="saveStatus"></div>
            <button class="save-btn" id="saveBtn" onclick="saveChanges()">Save Changes</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let sessionToken = null;
      let currentChannel = null;
      let changes = {};

      async function checkSession() {
        try {
          const res = await fetch('/api/auth/me', {
            headers: { 'X-Panel-Session': sessionToken || '' },
          });
          if (!res.ok) return false;
          const data = await res.json();
          sessionToken = data.token || sessionToken;
          showPanel(data);
          return true;
        } catch (e) {
          return false;
        }
      }

      // Handle OAuth redirect (fragment with access_token)
      function handleOAuthRedirect() {
        const hash = window.location.hash.substring(1);
        if (!hash) return;
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        if (!token) return;
        window.location.hash = '';
        sendToken(token);
      }

      async function sendToken(token) {
        setLoggingIn(true);
        document.getElementById('loginDesc').textContent = 'Completing login...';
        try {
          const res = await fetch('/api/auth/callback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token }),
          });
          if (!res.ok) {
            const text = await res.text();
            document.getElementById('loginScreen').innerHTML = `
              <h1>control panel</h1>
              <p style="color: var(--red);">Login failed: ${text}</p>
              <button class="login-btn" onclick="login()">Try again</button>
            `;
            return;
          }
          const data = await res.json();
          sessionToken = data.token;
          showPanel(data);
        } catch (e) {
          document.getElementById('loginScreen').innerHTML = `
            <h1>control panel</h1>
            <p style="color: var(--red);">Connection error</p>
            <button class="login-btn" onclick="login()">Try again</button>
          `;
        }
      }

      function setLoggingIn(loading) {
        const btn = document.getElementById('loginBtn');
        const text = document.getElementById('loginBtnText');
        const spinner = document.getElementById('loginLoading');
        btn.disabled = loading;
        text.textContent = loading ? 'Redirecting...' : 'Log in with Twitch';
        spinner.classList.toggle('hidden', !loading);
      }

      function login() {
        setLoggingIn(true);
        fetch('/api/auth/login')
          .then(r => r.json())
          .then(data => {
            const redirect = encodeURIComponent(window.location.origin + '/panel');
            window.location.href = 'https://id.twitch.tv/oauth2/authorize' +
              '?client_id=' + data.client_id +
              '&redirect_uri=' + redirect +
              '&response_type=token' +
              '&scope=user:read:email';
          })
          .catch(() => { setLoggingIn(false); });
      }

      function showPanel(data) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('panelView').classList.remove('hidden');
        document.getElementById('userDisplay').innerHTML = 'Logged in as <strong>' + (data.display_name || data.username) + '</strong>';

        const bar = document.getElementById('channelBar');
        bar.innerHTML = data.channels.map(ch =>
          `<button class="channel-btn" onclick="selectChannel('${ch}')">#${ch}</button>`
        ).join('');
        if (data.channels.length > 0) selectChannel(data.channels[0]);
      }

      let pendingChanges = { commands: {}, listeners: {} };

      function selectChannel(channel) {
        currentChannel = channel;
        document.querySelectorAll('.channel-btn').forEach(b => {
          b.classList.toggle('active', b.textContent === '#' + channel);
        });
        pendingChanges = { commands: {}, listeners: {} };
        changes = {};
        updateSaveStatus();
        loadCommands(channel);
        loadListeners(channel);
      }

      function toggleChanged(type, name, enabled) {
        const key = type + ':' + name;
        changes[key] = enabled;
        const hasChanges = Object.keys(changes).length > 0;
        document.getElementById('saveBtn').disabled = !hasChanges;
        if (!hasChanges) {
          document.getElementById('saveStatus').textContent = '';
        } else {
          const count = Object.keys(changes).length;
          document.getElementById('saveStatus').textContent = count + ' change(s) pending';
          document.getElementById('saveStatus').className = '';
        }
      }

      async function loadCommands(channel) {
        const div = document.getElementById('commandsList');
        div.className = 'loading';
        div.textContent = 'Loading commands...';
        try {
          const res = await fetch('/api/panel/commands?channel=' + channel, {
            headers: { 'X-Panel-Session': sessionToken },
          });
          if (!res.ok) { div.textContent = 'Failed to load commands.'; return; }
          const items = await res.json();
          document.getElementById('cmdCount').textContent = '(' + items.length + ')';
          div.className = '';
          div.innerHTML = items.map(cmd => {
            const enabled = changes['command:' + cmd.name] !== undefined ? changes['command:' + cmd.name] : cmd.enabled;
            return `
              <div class="item">
                <div class="item-info">
                  <span class="item-name">!${cmd.name}</span>
                  <span class="item-desc">${cmd.description}</span>
                  ${!cmd.can_disable ? '<span class="item-protected">protected</span>' : ''}
                </div>
                <label class="toggle">
                  <input type="checkbox" ${enabled ? 'checked' : ''} ${!cmd.can_disable ? 'disabled' : ''}
                    onchange="changeItem('command', '${cmd.name}', this.checked, ${cmd.can_disable})">
                  <span class="slider"></span>
                </label>
              </div>
            `;
          }).join('');
        } catch (e) {
          div.textContent = 'Error loading commands.';
        }
      }

      async function loadListeners(channel) {
        const div = document.getElementById('listenersList');
        div.className = 'loading';
        div.textContent = 'Loading listeners...';
        try {
          const res = await fetch('/api/panel/listeners?channel=' + channel, {
            headers: { 'X-Panel-Session': sessionToken },
          });
          if (!res.ok) { div.textContent = 'Failed to load listeners.'; return; }
          const items = await res.json();
          document.getElementById('listenerCount').textContent = '(' + items.length + ')';
          div.className = '';
          div.innerHTML = items.map(l => {
            const enabled = changes['listener:' + l.name] !== undefined ? changes['listener:' + l.name] : l.enabled;
            return `
              <div class="item">
                <div class="item-info">
                  <span class="item-name">${l.name}</span>
                  <span class="item-desc">${l.description}</span>
                  ${!l.can_disable ? '<span class="item-protected">protected</span>' : ''}
                </div>
                <label class="toggle">
                  <input type="checkbox" ${enabled ? 'checked' : ''} ${!l.can_disable ? 'disabled' : ''}
                    onchange="changeItem('listener', '${l.name}', this.checked, ${l.can_disable})">
                  <span class="slider"></span>
                </label>
              </div>
            `;
          }).join('');
        } catch (e) {
          div.textContent = 'Error loading listeners.';
        }
      }

      function changeItem(type, name, enabled, canDisable) {
        if (!canDisable) return;
        const key = type + ':' + name;
        changes[key] = enabled;
        updateSaveStatus();
      }

      function getDefaultEnabled(type, name) {
        return true; // will be overridden by change handler
      }

      function updateSaveStatus() {
        const count = Object.keys(changes).length;
        document.getElementById('saveBtn').disabled = count === 0;
        const status = document.getElementById('saveStatus');
        if (count === 0) {
          status.textContent = '';
          status.className = '';
        } else {
          status.textContent = count + ' change(s) pending';
          status.className = '';
        }
      }

      async function saveChanges() {
        const btn = document.getElementById('saveBtn');
        const status = document.getElementById('saveStatus');
        btn.disabled = true;
        status.textContent = 'Saving...';
        status.className = '';

        const changeList = Object.entries(changes).map(([key, enable]) => {
          const [type, ...nameParts] = key.split(':');
          return { type, name: nameParts.join(':'), enable };
        });

        try {
          const res = await fetch('/api/panel/save', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Panel-Session': sessionToken,
            },
            body: JSON.stringify({ channel: currentChannel, changes: changeList }),
          });
          if (!res.ok) {
            status.textContent = 'Failed to save changes.';
            status.className = 'error';
            btn.disabled = false;
            return;
          }
          const data = await res.json();
          const parts = [];
          if (data.commands_updated > 0) parts.push(data.commands_updated + ' command(s)');
          if (data.listeners_updated > 0) parts.push(data.listeners_updated + ' listener(s)');
          status.textContent = 'Saved: ' + parts.join(' and ') + ' updated.';
          status.className = '';
          changes = {};
          updateSaveStatus();
          loadCommands(currentChannel);
          loadListeners(currentChannel);
        } catch (e) {
          status.textContent = 'Network error.';
          status.className = 'error';
          btn.disabled = false;
        }
      }

      async function logout() {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'X-Panel-Session': sessionToken },
        });
        sessionToken = null;
        resetLoginScreen();
        document.getElementById('panelView').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
      }

      function resetLoginScreen() {
        document.getElementById('loginDesc').textContent = 'Log in with your Twitch account to manage commands and listeners.';
        document.getElementById('loginBtnText').textContent = 'Log in with Twitch';
        document.getElementById('loginLoading').classList.add('hidden');
        document.getElementById('loginBtn').disabled = false;
      }

      // Bootstrap
      (async function() {
        handleOAuthRedirect();
        const hasSession = await checkSession();
        if (!hasSession) {
          document.getElementById('panelView').classList.add('hidden');
          document.getElementById('loginScreen').classList.remove('hidden');
        }
      })();
    </script>
  </body>
</html>
