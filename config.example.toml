[twitch]
user = ""
# https://dev.twitch.tv/console
# https://twitchtokengenerator.com
client_id = ""
client_secret = ""
user_access_token = ""
refresh_token = ""

[bot]
prefix = "!"
channels = ["your_channel_here"]
ignored_users = ["streamelements", "creatisbot", "nightbot", "fossabot"]
moderators = [] # bot moderator permission
supporters = [] # ko-fi supporters

[ollama]
host = "192.168.0.101:11434"
model = "mistral:latest"
num_predict = 80
max_history = 80

[markov]
autosave_interval = 50
length_to_generate = 200

[[notifications]]
# twitch_channel = "channel_name"
# discord_webhook = "https://discord.com/api/webhooks/..."
# message = "{{channel}} is now live playing {{game}}! https://twitch.tv/{{channel}}"

[stt]
# Master switch - disabled by default
enabled = false
# Path to whisper.cpp CLI binary (usually just "whisper" or "main" if in PATH)
whisper_path = "whisper"
# Path to whisper.cpp model file (e.g. ggml-tiny.bin)
# Download from: https://huggingface.co/ggerganov/whisper.cpp
whisper_model = "/home/user/models/ggml-tiny.bin"
# Path to streamlink binary
streamlink_path = "streamlink"
# Path to ffmpeg binary
ffmpeg_path = "ffmpeg"
# Seconds between capture+transcribe cycles
capture_interval = 30

[discord]
token = "bot_token"
channels = ["channel_id"]

[[discord.links]]
# twitch_channel = "username"
# discord_webhook = "webhook_url"
# discord_user_id = "user_id"